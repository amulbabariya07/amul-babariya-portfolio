<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Amul Babariya</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d05;
            --bg: #0b0b0b;
            --card-bg: #141414;
            --text: #ffffff;
            --text-gray: #a0a0a0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; }
        
        .admin-container { 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at 10% 20%, rgba(255, 77, 5, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(255, 77, 5, 0.05) 0%, transparent 40%);
        }

        /* Login Card */
        #login-container {
            background: var(--card-bg); padding: 3rem; border-radius: 2rem;
            width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        /* Dashboard Layout */
        #dashboard { display: none; padding: 2rem; max-width: 1400px; margin: 0 auto; height: 100vh; overflow-y: auto; }
        
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 3rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .user-header { display: flex; align-items: center; gap: 1rem; flex: 1; }
        .user-avatar { 
            width: 50px; height: 50px; background: var(--primary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem;
        }

        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
        .panel-card { 
            background: var(--card-bg); padding: 2rem; border-radius: 1.5rem; 
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 2rem;
        }

        h3 { margin-bottom: 1.5rem; font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; color: var(--text-gray); }

        .form-field { margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; }
        .form-field label { display: block; font-size: 0.7rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .form-field input, .form-field textarea {
            width: 100%; background: transparent; border: none; color: white; font-size: 0.95rem; outline: none;
        }

        .save-btn {
            background: var(--primary); color: white; border: none; padding: 1rem 2rem;
            border-radius: 0.8rem; font-weight: bold; cursor: pointer; width: 100%;
            transition: all 0.3s;
        }

        .logout-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.1); color: white;
            padding: 0.6rem 1.2rem; border-radius: 0.6rem; cursor: pointer; font-size: 0.8rem;
            transition: all 0.2s;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.05); }

        /* Animation */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .panel-card { animation: slideUp 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <!-- Login Section -->
    <div class="admin-container" id="login-container-root">
        <div id="login-container">
            <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Welcome Back</h1>
            <p style="color: var(--text-gray); margin-bottom: 2.5rem; font-size: 0.9rem;">Sign in to portfolii managment system</p>
            
            <form id="login-form">
                <div class="form-field">
                    <label>Email Address</label>
                    <input type="email" id="email" required value="amulbabariya07@gmail.com">
                </div>
                <div class="form-field">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <p id="error-msg" style="color: #ff4d4d; font-size: 0.8rem; margin-bottom: 1rem; display: none;">Invalid credentials</p>
                <button type="submit" class="save-btn">Enter Dashboard</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Section (Initially Hidden) -->
    <div id="dashboard">
        <nav>
            <div class="user-header">
                <div class="user-avatar" id="avatar-txt">A</div>
                <div>
                    <div class="user-name" id="welcome-user" style="font-weight: bold;">Amul Babariya</div>
                    <div class="user-role" style="font-size: 0.75rem; color: var(--text-gray);">System Administrator</div>
                </div>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <button class="logout-btn" id="sync-file-btn" style="border-color: var(--primary); color: var(--primary);">
                    <i class="fa fa-file-import"></i> Sync Database
                </button>
                <button class="logout-btn" id="reconnect-file-btn" style="display: none; border-color: #ffcc00; color: #ffcc00;">
                    <i class="fa fa-plug"></i> Reconnect
                </button>
                <button class="logout-btn" id="logout-btn">
                    <i class="fa fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </nav>

        <div class="grid">
            <!-- Left Side: Profile Info -->
            <div class="panel-card">
                <h3><i class="fa fa-user-circle"></i> Personal Information</h3>
                <form id="profile-form">
                    <div class="form-field">
                        <label>Bio Summary</label>
                        <textarea id="bio-text" rows="4"></textarea>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-field">
                            <label>Birth Date</label>
                            <input type="text" id="birthdate-text">
                        </div>
                        <div class="form-field">
                            <label>Years of Experience</label>
                            <input type="text" id="experience-text">
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-field">
                            <label>Phone Number</label>
                            <input type="text" id="phone-text">
                        </div>
                        <div class="form-field">
                            <label>Location / Address</label>
                            <input type="text" id="address-text">
                        </div>
                    </div>
                </form>
            </div>

            <!-- Right Side: Stats & Sync -->
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <div class="panel-card">
                    <h3><i class="fa fa-chart-line"></i> Quick Stats</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div style="background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.05); text-align: center;">
                            <input type="text" id="stat-projects" style="font-size: 1.5rem; width: 100%; text-align: center; background: transparent; border: none; color: var(--primary); font-weight: 800;">
                            <p style="font-size: 0.7rem; color: var(--text-gray);">Projects Completed</p>
                        </div>
                        <div style="background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.05); text-align: center;">
                            <input type="text" id="stat-customers" style="font-size: 1.5rem; width: 100%; text-align: center; background: transparent; border: none; color: var(--primary); font-weight: 800;">
                            <p style="font-size: 0.7rem; color: var(--text-gray);">Happy Customers</p>
                        </div>
                    </div>
                    
                    <h3 style="margin-top: 2rem;"><i class="fa fa-sync"></i> Sync Status</h3>
                    <div id="sync-status-msg" style="background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.05); text-align: center;">
                         <p id="sync-text-status" style="font-size: 0.8rem; color: var(--text-gray);">No Database Connected</p>
                    </div>
                </div>
            </div>

            <!-- Full Width: Skills Management -->
            <div class="panel-card" style="grid-column: span 2;">
                <h3><i class="fa fa-pencil-ruler"></i> My Skills</h3>
                <div id="skills-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
                    <!-- Skill rows will follow here -->
                </div>
                <button class="logout-btn" id="add-skill-btn" style="border-color: var(--primary); color: var(--primary); width: 100%; padding: 1rem;">
                    <i class="fa fa-plus"></i> Add New Skill
                </button>
            </div>
        </div>

        <div style="margin-top: 3rem; padding-bottom: 5rem; display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;">
            <button id="global-save-btn" class="save-btn" style="height: 60px; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(255, 77, 5, 0.2);">
                <i class="fa fa-cloud-upload-alt"></i> Update Profile & Sync Database
            </button>
            <button id="reject-changes-btn" class="logout-btn" style="height: 60px; font-size: 0.9rem; border-color: rgba(255,255,255,0.1); color: var(--text-gray);">
                <i class="fa fa-undo"></i> Reject Changes & Revert
            </button>
        </div>
    </div>

    <!-- Relative paths updated to point to parent directory -->
    <script src="../js/admin.js"></script>
</body>
</html>
